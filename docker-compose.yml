services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hypercash
      POSTGRES_PASSWORD: HcDev2026!xK9p3x
      POSTGRES_DB: hypercash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypercash"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
